<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-title" content="Finance">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Finance Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/dark-mode.css?v=75" />
  <link rel="stylesheet" href="css/components.css?v=75" />
  <link rel="stylesheet" href="css/responsive.css?v=75" />
  <link rel="stylesheet" href="css/styles.css?v=75" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div id="update-notice" class="update-notice" role="status" aria-live="polite" hidden>
    Update available <button class="btn btn--sm btn--secondary" onclick="location.reload()">Refresh</button>
  </div>

  <div id="error-boundary" class="error-boundary" role="alert" aria-live="assertive" tabindex="-1" hidden>
    <strong>Something went wrong</strong>
    <p id="error-message"></p>
    <button class="btn btn--sm btn--danger" onclick="this.closest('#error-boundary').hidden=true">Dismiss</button>
  </div>

  <header id="app-header" class="app-header">
    <span class="app-header__title">Finance Dashboard</span>
    <span class="app-header__subtitle">Workbook control panel</span>
  </header>

  <nav class="tab-nav" role="navigation" aria-label="Finance dashboard navigation">
    <button class="tab-btn active" data-tab="dashboard" aria-selected="true" role="tab">
      <span class="tab-icon">&#128202;</span><span class="tab-label">Dashboard</span>
    </button>
    <button class="tab-btn" data-tab="paycheck" aria-selected="false" role="tab">
      <span class="tab-icon">&#128184;</span><span class="tab-label">Paycheck</span>
    </button>
    <button class="tab-btn" data-tab="accounts" aria-selected="false" role="tab">
      <span class="tab-icon">&#127974;</span><span class="tab-label">Accounts</span>
    </button>
    <button class="tab-btn" data-tab="changes" aria-selected="false" role="tab">
      <span class="tab-icon">&#128221;</span><span class="tab-label">Changes</span>
    </button>
    <button class="tab-btn" data-tab="sync" aria-selected="false" role="tab">
      <span class="tab-icon">&#128260;</span><span class="tab-label">Sync</span>
    </button>
    <button class="tab-btn" data-tab="settings" aria-selected="false" role="tab">
      <span class="tab-icon">&#9881;</span><span class="tab-label">Settings</span>
    </button>
  </nav>

  <main class="tab-content" id="main-content">
    <section id="tab-dashboard" class="tab-pane active" role="tabpanel" aria-label="Dashboard"></section>
    <section id="tab-paycheck" class="tab-pane" role="tabpanel" aria-label="Next Paycheck"></section>
    <section id="tab-accounts" class="tab-pane" role="tabpanel" aria-label="Accounts"></section>
    <section id="tab-changes" class="tab-pane" role="tabpanel" aria-label="Changes"></section>
    <section id="tab-sync" class="tab-pane" role="tabpanel" aria-label="Workbook Sync"></section>
    <section id="tab-settings" class="tab-pane" role="tabpanel" aria-label="Settings"></section>
  </main>

  <input id="json-import" type="file" accept="application/json,.json" hidden>
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <div id="modal-backdrop" class="modal-backdrop hidden" aria-hidden="true">
    <div id="modal-box" class="modal-box" role="dialog" aria-modal="true">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/config.js?v=75"></script>
  <script src="js/error-boundary.js?v=75"></script>
  <script src="js/a11y.js?v=75"></script>
  <script src="js/perf.js?v=75"></script>
  <script src="js/firebase/firebase-config.js?v=75"></script>
  <script src="js/firebase/cloud-backup.js?v=75"></script>
  <script src="storage.js?v=75"></script>
  <script src="dashboard.js?v=75"></script>
  <script src="app.js?v=75"></script>
</body>
</html>
