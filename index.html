<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Finance Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Language toggle + app header strip -->
  <div id="app-header" class="app-header">
    <span class="app-header__title">Finance Tracker</span>
    <div class="lang-selector" id="lang-selector">
    <button id="lang-toggle" onclick="App.Lang.setLang(App.Lang.getLang()==='en'?'es':'en')"
      style="background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:20px;
             padding:4px 12px;color:inherit;cursor:pointer;font-size:0.78rem;letter-spacing:.03em">
      🌐 EN
    </button>
  </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="tab-nav" role="navigation" aria-label="Main navigation">
    <button class="tab-btn active" data-tab="dashboard"   aria-selected="true"  role="tab">
      <span class="tab-icon">&#128202;</span><span class="tab-label">Dashboard</span>
    </button>
    <button class="tab-btn"        data-tab="accounts"    aria-selected="false" role="tab">
      <span class="tab-icon">&#127982;</span><span class="tab-label">Accounts</span>
    </button>
    <button class="tab-btn"        data-tab="transfers"   aria-selected="false" role="tab">
      <span class="tab-icon">&#128184;</span><span class="tab-label">Transfers</span>
    </button>
    <button class="tab-btn"        data-tab="planner"     aria-selected="false" role="tab">
      <span class="tab-icon">&#128197;</span><span class="tab-label">Planner</span>
    </button>
    <button class="tab-btn"        data-tab="investments" aria-selected="false" role="tab">
      <span class="tab-icon">&#128200;</span><span class="tab-label">Invest</span>
    </button>
    <button class="tab-btn"        data-tab="goals"       aria-selected="false" role="tab">
      <span class="tab-icon">&#127919;</span><span class="tab-label">Goals</span>
    </button>
    <button class="tab-btn"        data-tab="calendar"    aria-selected="false" role="tab">
      <span class="tab-icon">&#128197;</span><span class="tab-label">Calendar</span>
    </button>
    <button class="tab-btn"        data-tab="settings"    aria-selected="false" role="tab">
      <span class="tab-icon">&#9881;&#65039;</span><span class="tab-label">Settings</span>
    </button>
    <button class="tab-btn"        data-tab="paycheck-tracker" aria-selected="false" role="tab">
      <span class="tab-icon">&#128200;</span><span class="tab-label">Pck Tracker</span>
    </button>
    <button class="tab-btn"        data-tab="savings-plan" aria-selected="false" role="tab">
      <span class="tab-icon">&#128181;</span><span class="tab-label">Savings Plan</span>
    </button>
    <button class="tab-btn"        data-tab="next-year"    aria-selected="false" role="tab">
      <span class="tab-icon">&#128340;</span><span class="tab-label">Next Year</span>
    </button>
  </nav>

  <!-- Tab Content Panes -->
  <main class="tab-content" id="main-content">
    <section id="tab-dashboard"   class="tab-pane active" role="tabpanel" aria-label="Dashboard"></section>
    <section id="tab-accounts"    class="tab-pane"        role="tabpanel" aria-label="Accounts"></section>
    <section id="tab-transfers"   class="tab-pane"        role="tabpanel" aria-label="Transfers"></section>
    <section id="tab-planner"     class="tab-pane"        role="tabpanel" aria-label="Paycheck Planner"></section>
    <section id="tab-investments" class="tab-pane"        role="tabpanel" aria-label="Investments"></section>
    <section id="tab-settings"    class="tab-pane"        role="tabpanel" aria-label="Settings"></section>
    <!-- Legacy panes kept for JS module compat -->
    <section id="tab-setup"       class="tab-pane"        role="tabpanel" aria-label="Setup"></section>
    <section id="tab-goals"       class="tab-pane"        role="tabpanel" aria-label="Goals"></section>
    <section id="tab-calendar"    class="tab-pane"        role="tabpanel" aria-label="Calendar"></section>
    <section id="tab-tracker"     class="tab-pane"        role="tabpanel" aria-label="Tracker"></section>
    <section id="tab-entry"       class="tab-pane"        role="tabpanel" aria-label="Entry"></section>
    <section id="tab-paycheck-tracker" class="tab-pane"    role="tabpanel" aria-label="Paycheck Tracker"></section>
    <section id="tab-savings-plan"  class="tab-pane"       role="tabpanel" aria-label="Savings Plan"></section>
    <section id="tab-next-year"     class="tab-pane"       role="tabpanel" aria-label="Next Year Planner"></section>
  </main>

  <!-- Toast / snackbar -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Modal backdrop -->
  <div id="modal-backdrop" class="modal-backdrop hidden" aria-hidden="true">
    <div id="modal-box" class="modal-box" role="dialog" aria-modal="true">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- JS load order: storage first, lang second, modules, app last -->
  <script src="storage.js?v=51"></script>
  <script src="lang.js?v=51"></script>
  <script src="setup.js?v=51"></script>
  <script src="paychecks.js?v=51"></script>
  <script src="entry.js?v=51"></script>
  <script src="transfers.js?v=51"></script>
  <script src="tracker.js?v=51"></script>
  <script src="accounts.js?v=51"></script>
  <script src="investments.js?v=51"></script>
  <script src="dashboard.js?v=51"></script>
  <script src="goals.js?v=51"></script>
  <script src="calendar.js?v=51"></script>
  <script src="paycheck-tracker.js?v=51"></script>
  <script src="savings-plan.js?v=51"></script>
  <script src="next-year-planner.js?v=51"></script>
  <script src="app.js?v=51"></script>

</body>
</html>
